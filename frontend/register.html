<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ScamDetect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">🛡️</div>
            <span>ScamDetect</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="checker.html">Scam Checker</a>
            <a href="community.html">Community</a>
            <a href="reports.html">Reports</a>
        </div>
        <div class="nav-right"></div>
    </nav>

    <div class="page-hero">
        <h1>Create <span class="gradient-text">Account</span></h1>
        <p>Join the community of scam-aware job seekers</p>
    </div>

    <div class="page-content" style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <form id="register-form">
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" id="full_name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" id="confirm_password" class="form-control" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" id="location" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Skills (comma separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="Python, JavaScript, Data Analysis">
                </div>
                <div class="form-group">
                    <label class="form-label">Education</label>
                    <input type="text" id="education" class="form-control" placeholder="B.Tech Computer Science">
                </div>
                <div class="form-group">
                    <label class="form-label">Years of Experience</label>
                    <input type="number" id="experience" class="form-control" value="0">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem;">
                Already have an account? <a href="login.html" style="color: var(--accent-blue);">Login here</a>
            </p>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 ScamDetect - Protecting Job Seekers Worldwide</p>
    </div>

    <div class="chatbot-bubble">🤖</div>
    <div class="chatbot-panel">
        <div class="chatbot-header">
            <div class="chatbot-avatar">🛡️</div>
            <div style="flex:1;"><strong>ScamGuard AI</strong><br><small style="font-size:0.7rem;">Online</small></div>
            <button class="chatbot-close" style="background:none;border:none;color:white;font-size:1.2rem;">✕</button>
        </div>
        <div class="chatbot-msgs"></div>
        <div class="chatbot-input-row">
            <input class="chatbot-input" placeholder="Ask me anything...">
            <button class="chatbot-send">➤</button>
        </div>
    </div>

    <script src="js/chatbot.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s);
            
            const userData = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                password: password,
                phone_number: document.getElementById('phone').value || null,
                location: document.getElementById('location').value || null,
                skills: skills,
                education: document.getElementById('education').value || null,
                experience_years: parseInt(document.getElementById('experience').value) || 0
            };
            
            try {
                await AuthService.register(userData);
                showToast('Registration successful! Please login.', 'success');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
    </script>
</body>
</html>
