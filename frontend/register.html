<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrapper { width:100%; max-width:440px; margin:0 auto; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:36px; }
    .auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:24px; text-decoration:none; }
    .auth-logo-icon { width:42px; height:42px; border-radius:10px; background:linear-gradient(135deg,var(--teal),var(--navy)); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .auth-logo-text { font-size:18px; font-weight:800; background:linear-gradient(90deg,var(--teal),var(--navy)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .auth-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .auth-sub   { color:var(--text-secondary); font-size:13px; margin-bottom:28px; }
    .pwd-wrap   { position:relative; }
    .pwd-eye    { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:2px; }
    .strength-bar  { height:4px; border-radius:99px; background:var(--bg-input); margin-top:6px; overflow:hidden; }
    .strength-fill { height:100%; border-radius:99px; transition:all .3s; width:0%; }
    .match-hint { font-size:12px; margin-top:5px; min-height:16px; }
    .auth-page { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
    .auth-back-btn { position:absolute; top:20px; left:20px; }
    .theme-toggle { position:fixed; top:20px; right:20px; display:flex; }
  </style>
</head>
<body>
<button class="back-btn auth-back-btn" onclick="history.length > 1 ? history.back() : location.href='login.html'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back
</button>

<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><path d="M16 2L4 7v9c0 7.18 5.14 13.9 12 15.93C22.86 29.9 28 23.18 28 16V7L16 2z" fill="rgba(255,255,255,0.9)"/><path d="M11 16l3.5 3.5L21.5 12" stroke="#2F4156" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="auth-logo-text">ScamShield</span>
      </a>

      <div class="auth-title">Create your account</div>
      <p class="auth-sub">Join thousands protecting themselves from job scams. Free forever.</p>

      <!-- Name -->
      <div class="form-group">
        <label class="form-label">Full Name <span style="color:var(--accent-red,#e05252)">*</span></label>
        <input type="text" id="reg-name" class="form-control" placeholder="Your full name" autocomplete="name">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address <span style="color:var(--accent-red,#e05252)">*</span></label>
        <input type="email" id="reg-email" class="form-control" placeholder="you@email.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--accent-red,#e05252)">*</span></label>
        <div class="pwd-wrap">
          <input type="password" id="reg-password" class="form-control" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" style="padding-right:44px" autocomplete="new-password">
          <button class="pwd-eye" onclick="togglePwd('reg-password',this)" type="button">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div id="strength-text" style="font-size:12px;margin-top:4px;min-height:16px;color:var(--text-muted)"></div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password <span style="color:var(--accent-red,#e05252)">*</span></label>
        <div class="pwd-wrap">
          <input type="password" id="reg-confirm" class="form-control" placeholder="Repeat your password" oninput="checkMatch()" style="padding-right:44px" autocomplete="new-password">
          <button class="pwd-eye" onclick="togglePwd('reg-confirm',this)" type="button">👁</button>
        </div>
        <div class="match-hint" id="match-hint"></div>
      </div>

      <!-- Terms -->
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;font-size:13px">
        <input type="checkbox" id="agree-terms" style="accent-color:var(--teal);margin-top:2px;flex-shrink:0">
        <label for="agree-terms" style="cursor:pointer;color:var(--text-secondary);line-height:1.6">
          I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
        </label>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="reg-btn" onclick="handleRegister()">Create Account</button>

      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">
        Already have an account? <a href="login.html" class="link">Sign in</a>
      </p>
    </div>

    <button class="theme-toggle" style="position:fixed;top:20px;right:20px;display:flex" onclick="toggleTheme()">
      <span class="theme-toggle-icon">☀</span>
      <span class="theme-toggle-text">Light Mode</span>
    </button>
  </div>
</div>

<script src="js/main.js"></script>
<script>
function togglePwd(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🙈';
}

function checkStrength(pw) {
  let s = 0;
  if (pw.length >= 8)        s++;
  if (/[A-Z]/.test(pw))      s++;
  if (/[0-9]/.test(pw))      s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const colors = ['#f85149','#e3702a','#d29922','#3fb950'];
  const labels = ['Weak','Fair','Good','Strong'];
  const fill = document.getElementById('strength-fill');
  const text = document.getElementById('strength-text');
  fill.style.width   = s > 0 ? (s * 25) + '%' : '0%';
  fill.style.background = colors[s-1] || 'transparent';
  text.textContent   = s > 0 ? labels[s-1] : '';
  text.style.color   = colors[s-1] || 'var(--text-muted)';
  checkMatch();
}

function checkMatch() {
  const pw  = document.getElementById('reg-password').value;
  const cf  = document.getElementById('reg-confirm').value;
  const hint = document.getElementById('match-hint');
  if (!cf) { hint.textContent = ''; return; }
  if (pw === cf) {
    hint.textContent = '✓ Passwords match';
    hint.style.color = 'var(--accent-green,#3fb950)';
  } else {
    hint.textContent = '✗ Passwords do not match';
    hint.style.color = 'var(--accent-red,#f85149)';
  }
}

async function handleRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;

  if (!name || !email || !password || !confirm) { 
    showToast('Please fill in all fields', 'warning'); 
    return; 
  }
  if (password.length < 8) { 
    showToast('Password must be at least 8 characters', 'warning'); 
    return; 
  }
  if (password !== confirm) { 
    showToast('Passwords do not match', 'error'); 
    return; 
  }
  if (!document.getElementById('agree-terms').checked) { 
    showToast('Please agree to the Terms of Service', 'warning'); 
    return; 
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; 
  btn.textContent = 'Creating account…';

  try {
    const data = await api.post('/api/auth/signup', {
      name: name,
      email: email,
      password: password
    });
    
    const token = data.access_token || data.token;
    const user = data.user || data;
    
    if (token) {
      localStorage.setItem('gr_token', token);
      localStorage.setItem('gr_user', JSON.stringify(user));
    }
    
    showToast('Account created successfully! Welcome to ScamShield 🎉', 'success');
    setTimeout(() => {
      location.href = (user.role === 'admin') ? 'admin.html' : 'index.html';
    }, 800);
  } catch (error) {
    console.error('Registration error:', error);
    showToast(error.message || 'Registration failed. Please try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  updateThemeBtn(localStorage.getItem('gr_theme') || 'dark');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.closest('.auth-card')) handleRegister();
});
</script>
</body>
</html>
