<script>
let avatarDataURL = null;
const skills = [];

function previewAvatar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    avatarDataURL = e.target.result;
    const circle = document.getElementById('avatar-circle');
    circle.innerHTML = `<img src="${avatarDataURL}" alt="Avatar">`;
  };
  reader.readAsDataURL(file);
}

function addSkill() {
  const input = document.getElementById('skill-input');
  const val = input.value.trim();
  if (!val || skills.includes(val)) { input.value = ''; return; }
  skills.push(val); input.value = '';
  const preview = document.getElementById('skills-preview');
  const tag = document.createElement('span');
  tag.className = 'skill-tag';
  tag.style.cursor = 'pointer';
  tag.innerHTML = val + ' <span style="opacity:0.6">✕</span>';
  tag.onclick = () => { skills.splice(skills.indexOf(val), 1); tag.remove(); };
  preview.appendChild(tag);
}

function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#f85149', '#e3702a', '#d29922', '#3fb950'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];
  const fill = document.getElementById('strength-fill');
  const text = document.getElementById('strength-text');
  fill.style.width = (score * 25) + '%';
  fill.style.background = colors[score - 1] || '#484f58';
  text.textContent = score > 0 ? labels[score - 1] : '';
  text.style.color = colors[score - 1] || 'var(--text-muted)';
}

function togglePwd(id) { const f = document.getElementById(id); f.type = f.type === 'password' ? 'text' : 'password'; }

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const mobile = document.getElementById('reg-mobile').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  if (!name || !email || !mobile || !password) { showToast('Please fill in all required fields', 'warning'); return; }
  if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
  if (!document.getElementById('agree-terms').checked) { showToast('Please agree to the Terms of Service', 'warning'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const payload = {
    full_name: name, email, mobile, password,
    city: document.getElementById('reg-city').value.trim(),
    profession: document.getElementById('reg-profession').value,
    bio: document.getElementById('reg-bio').value.trim(),
    skills, avatar: avatarDataURL
  };
  try {
    const data = await api.post('/auth/register', payload);
    localStorage.setItem('ss_token', data.token);
    localStorage.setItem('ss_user', JSON.stringify(data.user));
    showToast('Account created! Welcome to ScamShield 🛡️', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch (e) {
    // Demo mode
    const demoUser = { user_id: 'new-' + Date.now(), email, full_name: name, role: 'user', avatar: avatarDataURL, skills, mobile, city: document.getElementById('reg-city').value.trim(), bio: document.getElementById('reg-bio').value.trim(), reports_count: 0, checks_count: 0 };
    localStorage.setItem('ss_token', 'demo-token-user');
    localStorage.setItem('ss_user', JSON.stringify(demoUser));
    showToast('Account created! (Demo mode – connect backend for persistence)', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}
</script>
</body></html>
