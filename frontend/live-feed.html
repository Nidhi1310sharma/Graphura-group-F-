<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Scam Feed - ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .live-pulse { width:8px;height:8px;border-radius:50%;background:var(--accent-red);animation:pulse 1.4s infinite;display:inline-block; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .feed-card-full { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:var(--transition); }
    .feed-card-full:hover { border-color:var(--border-hover); }
    .risk-dot-lg { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
    .risk-dot-lg.red { background:var(--accent-red);box-shadow:0 0 8px var(--accent-red); }
    .risk-dot-lg.amber { background:var(--accent-orange); }
    .risk-dot-lg.green { background:var(--accent-green); }
    .feed-score { font-family:var(--font-mono);font-size:22px;font-weight:800;min-width:40px;text-align:center; }
    .feed-score.high { color:var(--accent-red); }
    .feed-score.medium { color:var(--accent-orange); }
    .feed-score.low { color:var(--accent-green); }
    .signal-chip { font-size:11px;padding:2px 7px;border-radius:99px;background:rgba(248,81,73,.08);color:var(--accent-red);border:1px solid rgba(248,81,73,.15);margin:2px; }
    .signal-chip.warn { background:rgba(210,153,34,.08);color:var(--accent-yellow);border-color:rgba(210,153,34,.15); }
    .signal-chip.ok { background:rgba(63,185,80,.08);color:var(--accent-green);border-color:rgba(63,185,80,.15); }
    .filter-strip { display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap; }
    .filter-pill { padding:5px 13px;border-radius:99px;background:var(--bg-input);border:1px solid var(--border);font-size:12.5px;color:var(--text-secondary);cursor:pointer;transition:var(--transition); }
    .filter-pill:hover,.filter-pill.active { border-color:var(--accent-blue);color:var(--accent-blue);background:rgba(88,166,255,.08); }
  </style>
</head>
<body>
<div class="page-container wide" style="margin-top:28px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <h1 style="margin:0">Live Scam Feed</h1>
    <div style="display:flex;align-items:center;gap:5px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:var(--accent-red);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px"><div class="live-pulse"></div>LIVE</div>
    <span style="font-size:13px;color:var(--text-muted)" id="feed-meta">Auto-updates every 30s</span>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" id="pause-btn" onclick="togglePause(this)">Pause</button>
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>
  <div class="filter-strip">
    <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pill" onclick="setFilter('high',this)">High Risk</button>
    <button class="filter-pill" onclick="setFilter('medium',this)">Suspicious</button>
    <button class="filter-pill" onclick="setFilter('low',this)">Safe</button>
    <button class="filter-pill" onclick="setFilter('fee',this)">Fee Demand</button>
    <button class="filter-pill" onclick="setFilter('impersonation',this)">Impersonation</button>
  </div>
  <div id="feed-list"></div>
</div>
<script src="js/main.js"></script>
<script src="js/nav.js"></script>
<script src="js/chatbot.js"></script>
<script>
const ALL_ENTRIES = [
  { job:'Data Entry Intern',company:'XYZ Solutions',domain:'xyz-careers.in',city:'Pune',time:'2m ago',risk:'high',riskCls:'red',score:87,type:'fee',signals:[{t:'Registration fee asked',c:'bad'},{t:'Gmail recruiter',c:'bad'},{t:'Domain 12 days old',c:'bad'}] },
  { job:'WFH Customer Care',company:'DigiWork India',domain:'digiwork-india.net',city:'Mumbai',time:'5m ago',risk:'high',riskCls:'red',score:79,type:'fee',signals:[{t:'Fee demanded upfront',c:'bad'},{t:'No SSL certificate',c:'bad'},{t:'WhatsApp only',c:'warn'}] },
  { job:'Digital Marketing Exec',company:'GlobalWork',domain:'globalwork.xyz',city:'Delhi',time:'11m ago',risk:'medium',riskCls:'amber',score:61,type:'suspicious',signals:[{t:'Salary 6x market rate',c:'bad'},{t:'Free email domain',c:'warn'}] },
  { job:'HR Recruiter WFH',company:'CareerBoost Pvt',domain:'careerboost-hr.com',city:'Bangalore',time:'18m ago',risk:'high',riskCls:'red',score:74,type:'impersonation',signals:[{t:'Impersonating Infosys',c:'bad'},{t:'Fake letterhead',c:'bad'},{t:'Urgent joining',c:'warn'}] },
  { job:'Remote Data Analyst',company:'TechGrow India',domain:'techgrow-in.xyz',city:'Chennai',time:'22m ago',risk:'medium',riskCls:'amber',score:58,type:'suspicious',signals:[{t:'Vague description',c:'warn'},{t:'Domain 34 days old',c:'warn'}] },
  { job:'Content Writer WFH',company:'WritePro Hub',domain:'writepro-hub.com',city:'Hyderabad',time:'29m ago',risk:'medium',riskCls:'amber',score:52,type:'suspicious',signals:[{t:'Unrealistic salary',c:'warn'},{t:'No company info',c:'warn'}] },
  { job:'Python Developer',company:'Tata Consultancy Services',domain:'tcs.com',city:'Pune',time:'34m ago',risk:'low',riskCls:'green',score:6,type:'verified',signals:[{t:'Official domain',c:'ok'},{t:'Corporate email',c:'ok'},{t:'SSL valid',c:'ok'}] },
  { job:'Sales Executive',company:'Zomato',domain:'zomato.com',city:'Gurgaon',time:'41m ago',risk:'low',riskCls:'green',score:4,type:'verified',signals:[{t:'Domain 11 years old',c:'ok'},{t:'Verified company',c:'ok'}] },
  { job:'BPO Executive Night Shift',company:'QuickEarnings Ltd',domain:'quickearnings-jobs.in',city:'Jaipur',time:'47m ago',risk:'high',riskCls:'red',score:83,type:'fee',signals:[{t:'Advance salary request',c:'bad'},{t:'No office address',c:'bad'},{t:'MLM structure',c:'bad'}] },
  { job:'Typing Operator WFH',company:'NetJob India',domain:'netjob-india.xyz',city:'Noida',time:'55m ago',risk:'high',riskCls:'red',score:91,type:'fee',signals:[{t:'Security deposit 3000',c:'bad'},{t:'Domain 8 days old',c:'bad'},{t:'Telegram only',c:'bad'}] },
];

let paused = false; let currentFilter = 'all'; let interval;

function renderFeed(entries) {
  const badgeCls = { high:'badge-red', medium:'badge-orange', low:'badge-green' };
  const badgeTxt = { high:'HIGH RISK', medium:'SUSPICIOUS', low:'SAFE' };
  document.getElementById('feed-list').innerHTML = entries.map(e => `
    <div class="feed-card-full" data-risk="${e.risk}" data-type="${e.type}">
      <div class="risk-dot-lg ${e.riskCls}"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px">${e.job}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
          ${e.company} &nbsp;·&nbsp; <span class="mono">${e.domain}</span> &nbsp;·&nbsp; ${e.city}
        </div>
        <div style="margin-top:6px">${e.signals.map(s=>`<span class="signal-chip ${s.c}">${s.t}</span>`).join('')}</div>
      </div>
      <div class="feed-score ${e.risk}">${e.score}</div>
      <span class="badge ${badgeCls[e.risk]}">${badgeTxt[e.risk]}</span>
      <a href="index.html" class="btn btn-outline btn-sm" style="flex-shrink:0">Analyze</a>
    </div>`).join('');
  document.getElementById('feed-meta').textContent = entries.length + ' entries · ' + (paused ? 'Paused' : 'Auto-updating');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = f === 'all' ? ALL_ENTRIES : ALL_ENTRIES.filter(e => e.risk === f || e.type === f);
  renderFeed(filtered);
}

function togglePause(btn) {
  paused = !paused;
  btn.textContent = paused ? 'Resume' : 'Pause';
  if (paused) clearInterval(interval); else startInterval();
}

function startInterval() {
  interval = setInterval(() => {
    if (paused) return;
    const newEntry = { job:'New Alert: WFH Data Entry',company:'EarnHome Co',domain:'earnhome-jobs.xyz',city:'Indore',time:'just now',risk:'high',riskCls:'red',score:88,type:'fee',signals:[{t:'Fee 2000 upfront',c:'bad'},{t:'Domain 5 days old',c:'bad'}] };
    ALL_ENTRIES.unshift(newEntry);
    const filtered = currentFilter === 'all' ? ALL_ENTRIES : ALL_ENTRIES.filter(e => e.risk === currentFilter || e.type === currentFilter);
    renderFeed(filtered);
    const first = document.querySelector('.feed-card-full');
    if (first) { first.style.animation = 'none'; first.getBoundingClientRect(); first.style.animation = 'fadeIn .4s ease'; }
  }, 30000);
}

function exportCSV() {
  const csv = ['Job,Company,Domain,City,Risk,Score,Time'].concat(ALL_ENTRIES.map(e => `"${e.job}","${e.company}","${e.domain}","${e.city}","${e.risk}","${e.score}","${e.time}"`)).join('\n');
  const a = document.createElement('a'); a.href = 'data:text/csv,' + encodeURIComponent(csv); a.download = 'scamshield-feed.csv'; a.click();
  showToast('Exported as CSV', 'success');
}

document.addEventListener('DOMContentLoaded', () => { initTheme(); renderNavbar(); renderFeed(ALL_ENTRIES); startInterval(); });
</script>
</body></html>
