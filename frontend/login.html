<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-primary); padding:20px; }
    .auth-wrapper { width:100%; max-width:420px; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:36px; }
    .auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
    .auth-logo-icon { width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:20px; }
    .auth-logo-text { font-size:18px; font-weight:800; }
    .auth-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .auth-sub { color:var(--text-secondary); font-size:13px; margin-bottom:24px; }
    .demo-box { background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-top:20px; }
    .demo-box-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:10px; }
    .demo-btn-row { display:flex; gap:8px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🛡️</div>
        <div class="auth-logo-text">ScamShield</div>
      </div>
      <div class="auth-title">Welcome back</div>
      <p class="auth-sub">Sign in to your account to continue protecting yourself from job scams.</p>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" id="login-password" class="form-control" placeholder="Your password" autocomplete="current-password" style="padding-right:42px">
          <button onclick="togglePwd('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px">👁</button>
        </div>
      </div>
      <div class="flex-between mb-3">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" style="accent-color:var(--accent-blue)"> Remember me</label>
        <a href="#" class="link" style="font-size:13px">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="handleLogin()">Sign In</button>

      <!-- Demo Accounts -->
      <div class="demo-box">
        <div class="demo-box-title">🎭 Demo Accounts (no signup needed)</div>
        <div class="demo-btn-row">
          <button class="btn btn-outline btn-full" onclick="demoLogin('user')">👤 User Demo</button>
          <button class="btn btn-outline btn-full" onclick="demoLogin('admin')">🔐 Admin Demo</button>
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center">Admin login: admin@scamshield.in / Admin@2026</p>
      </div>

      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">
        Don't have an account? <a href="register.html" class="link">Sign up free</a>
      </p>
    </div>

    <button class="theme-toggle" style="position:fixed;top:20px;right:20px;display:flex" onclick="toggleTheme()">
      <span class="theme-toggle-icon">☀️</span>
      <span class="theme-toggle-text">Light Mode</span>
    </button>
  </div>
</div>
<script src="js/main.js"></script>
<script>
// Demo credentials (for presentation)
const DEMO_USERS = {
  user: {
    user_id: 'demo-user-001',
    email: 'demo@scamshield.in',
    full_name: 'Rahul Sharma',
    role: 'user',
    avatar: null,
    skills: ['Job Safety', 'Scam Detection', 'Domain Research'],
    mobile: '9876543210',
    bio: 'Active community member helping others stay safe from job scams. Filed 5 reports, saved 12 friends from scams.',
    reports_count: 5,
    checks_count: 23
  },
  admin: {
    user_id: 'admin-001',
    email: 'admin@scamshield.in',
    full_name: 'Sunil (Admin)',
    role: 'admin',
    avatar: null,
    skills: ['Platform Management', 'Data Analysis', 'ML Pipeline'],
    mobile: '9999999999',
    bio: 'ScamShield platform administrator. Managing 1800+ job records and ML models.',
    reports_count: 0,
    checks_count: 0
  }
};

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showToast('Please fill in all fields', 'warning'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  // Check demo credentials
  if (email === 'admin@scamshield.in' && password === 'Admin@2026') {
    await new Promise(r => setTimeout(r, 800));
    loginAs('admin'); return;
  }
  if (email === 'demo@scamshield.in' && (password === 'Demo@2026' || password.length > 3)) {
    await new Promise(r => setTimeout(r, 800));
    loginAs('user'); return;
  }

  try {
    const data = await api.post('/auth/login', { email, password });
    localStorage.setItem('ss_token', data.token);
    localStorage.setItem('ss_user', JSON.stringify(data.user));
    showToast('Welcome back!', 'success');
    setTimeout(() => window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html', 600);
  } catch (e) {
    showToast('Invalid credentials. Use demo accounts below.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function demoLogin(role) { loginAs(role); }

function loginAs(role) {
  const user = DEMO_USERS[role];
  localStorage.setItem('ss_token', 'demo-token-' + role + '-' + Date.now());
  localStorage.setItem('ss_user', JSON.stringify(user));
  showToast('Signed in as ' + user.full_name, 'success');
  setTimeout(() => window.location.href = role === 'admin' ? 'admin.html' : 'index.html', 700);
}

function togglePwd(id) { const f = document.getElementById(id); f.type = f.type === 'password' ? 'text' : 'password'; }
document.addEventListener('DOMContentLoaded', initTheme);
</script>
</body></html>
