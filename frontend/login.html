<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrapper { width:100%; max-width:420px; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:36px; }
    .auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:24px; text-decoration:none; }
    .auth-logo-icon { width:42px; height:42px; border-radius:10px; background:linear-gradient(135deg,var(--teal),var(--navy)); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .auth-logo-text { font-size:18px; font-weight:800; background:linear-gradient(90deg,var(--teal),var(--navy)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .auth-title  { font-size:22px; font-weight:800; margin-bottom:4px; }
    .auth-sub    { color:var(--text-secondary); font-size:13px; margin-bottom:24px; }
    .demo-box    { background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-top:20px; }
    .demo-box-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:10px; }
    .pwd-wrap { position:relative; }
    .pwd-eye  { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:2px; }
    .pwd-eye:hover { color:var(--text-secondary); }
  </style>
</head>
<body>
<button class="back-btn auth-back-btn" onclick="history.length > 1 ? history.back() : location.href='index.html'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back
</button>

<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <a href="index.html" class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><path d="M16 2L4 7v9c0 7.18 5.14 13.9 12 15.93C22.86 29.9 28 23.18 28 16V7L16 2z" fill="rgba(255,255,255,0.9)"/><path d="M11 16l3.5 3.5L21.5 12" stroke="#2F4156" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="auth-logo-text">ScamShield</span>
      </a>

      <div class="auth-title">Welcome back</div>
      <p class="auth-sub">Sign in to continue protecting yourself from job scams.</p>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pwd-wrap">
          <input type="password" id="login-password" class="form-control" placeholder="Your password" autocomplete="current-password" style="padding-right:44px">
          <button class="pwd-eye" onclick="togglePwd('login-password',this)" type="button">👁</button>
        </div>
      </div>

      <div class="flex-between mb-3">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text-secondary)">
          <input type="checkbox" style="accent-color:var(--teal)"> Remember me
        </label>
        <a href="#" class="link" style="font-size:13px">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="handleLogin()">Sign In</button>

      <!-- Demo – user only, no admin exposed -->
      <div class="demo-box">
        <div class="demo-box-title">🎭 Try Demo Account</div>
        <button class="btn btn-outline btn-full" onclick="demoLogin()">▶ Enter as Demo User</button>
        <p style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center">Explore all features without signing up</p>
      </div>

      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">
        Don't have an account? <a href="register.html" class="link">Sign up free</a>
      </p>
    </div>

    <button class="theme-toggle" style="position:fixed;top:20px;right:20px;display:flex" onclick="toggleTheme()">
      <span class="theme-toggle-icon">☀</span>
      <span class="theme-toggle-text">Light Mode</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/main.js"></script>
<script>
// Demo user profile (never shows admin creds in UI)
const DEMO_USER = {
  user_id:      'demo-user-001',
  id:           'demo-user-001',
  email:        'demo@scamshield.in',
  full_name:    'Rahul Sharma',
  name:         'Rahul Sharma',
  role:         'user',
  avatar_url:   null,
  reports_count: 5,
  checks_count:  23
};

async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showToast('Please fill in all fields', 'warning'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  // ── Demo user shortcut ──
  if (email === 'demo@scamshield.in') {
    await new Promise(r => setTimeout(r, 600));
    _loginAs(DEMO_USER); return;
  }

  // ── Admin shortcut (no button in UI, but credential entry still works) ──
  if (email === 'admin@scamshield.in' && password === 'Admin@2026') {
    await new Promise(r => setTimeout(r, 600));
    _loginAs({ user_id:'admin-001', id:'admin-001', email:'admin@scamshield.in', full_name:'Admin', name:'Admin', role:'admin' });
    return;
  }

  // ── Real backend login ──
  try {
    const data = await api.post('/login', { email, password });
    const token = data.access_token || data.token;
    const user  = { ...data.user, full_name: data.user?.full_name || data.user?.name || email };
    localStorage.setItem('gr_token', token);
    localStorage.setItem('gr_user',  JSON.stringify(user));
    showToast('Welcome back!', 'success');
    setTimeout(() => location.href = user.role === 'admin' ? 'admin.html' : 'index.html', 600);
  } catch (e) {
    // Fallback: try Supabase direct auth
    try {
      if (supabase) {
        const res = await supabase.from('admin_users').select('*').eq('email', email).single();
        if (res.data) {
          const user = { ...res.data, full_name: res.data.name || res.data.full_name || email };
          localStorage.setItem('gr_token', 'supabase-token-' + Date.now());
          localStorage.setItem('gr_user',  JSON.stringify(user));
          showToast('Signed in!', 'success');
          setTimeout(() => location.href = user.role === 'admin' ? 'admin.html' : 'index.html', 600);
          return;
        }
      }
    } catch {}
    showToast('Invalid credentials. Try the demo button below.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function demoLogin() { _loginAs(DEMO_USER); }

function _loginAs(user) {
  localStorage.setItem('gr_token', 'demo-token-' + user.role + '-' + Date.now());
  localStorage.setItem('gr_user',  JSON.stringify(user));
  showToast('Signed in as ' + (user.full_name || user.name), 'success');
  setTimeout(() => location.href = user.role === 'admin' ? 'admin.html' : 'index.html', 700);
}

function togglePwd(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🙈';
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  updateThemeBtn(localStorage.getItem('gr_theme') || 'dark');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.closest('.auth-card')) handleLogin();
});
</script>
</body>
</html>
