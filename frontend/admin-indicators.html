<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scam Indicators – ScamShield Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="admin.html" class="sidebar-brand"><span class="sidebar-logo">🛡️</span><div><span class="brand-name">ScamShield</span><span class="brand-sub">Admin Panel</span></div></a>
    <nav class="admin-nav">
      <a href="admin.html"><span>📊</span> Overview</a>
      <a href="admin-reports.html" class="indicatorsreports"><span>🚩</span> Reports</a>
      <a href="admin-community.html" class="indicatorscommunity"><span>👥</span> Community</a>
      <a href="admin-listings.html" class="indicatorslistings"><span>💼</span> Listings</a>
      <div class="admin-nav-group">Knowledge Base</div>
      <a href="admin-companies.html" class="indicatorscompanies"><span>🏢</span> Companies</a>
      <a href="admin-domains.html" class="indicatorsdomains"><span>🌐</span> Domains</a>
      <a href="admin-indicators.html" class="active" class="active" class="active"><span>⚡</span> Scam Indicators</a>
      <div class="admin-nav-group">System</div>
      <a href="admin-users.html" class="indicatorsadmins"><span>👤</span> Admins & Logs</a>
    </nav>
    <div class="admin-sidebar-footer">
      <div style="display:flex;gap:6px"><button class="theme-toggle" onclick="toggleTheme()" style="flex:1;font-size:12px"><span class="theme-toggle-icon">☀️</span> <span class="theme-toggle-text">Light</span></button><button class="btn btn-ghost btn-sm" onclick="auth.logout()">Sign out</button></div>
    </div>
  </aside>
  <div class="admin-main"><div class="admin-page">
    
      <div class="page-header"><h1>⚡ Scam Indicators — Rule Engine</h1><p>Keywords and patterns used for fraud detection scoring</p></div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input type="text" class="form-control" style="max-width:180px" id="new-kw" placeholder="New keyword…">
        <select class="form-control" style="max-width:160px" id="new-cat">
          <option value="fee_demand">fee_demand</option>
          <option value="urgency">urgency</option>
          <option value="contact">contact</option>
          <option value="salary">salary</option>
          <option value="structure">structure</option>
          <option value="impersonation">impersonation</option>
        </select>
        <input type="number" class="form-control" style="max-width:90px" id="new-wt" placeholder="Weight" value="1.5" step="0.5" min="0.5" max="5">
        <button class="btn btn-primary" onclick="addIndicator()">+ Add</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table><thead><tr><th>Keyword</th><th>Category</th><th>Weight</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody id="ind-tbody"><tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">Loading…</td></tr></tbody></table>
        </div>
      </div>

  </div></div>
</div>
<script src="js/main.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/chatbot.js"></script>
<script>

async function loadIndicators() {
  try {
    const inds = await DB.getIndicators();
    document.getElementById("ind-tbody").innerHTML = inds.map(i => `
      <tr>
        <td><strong>${i.keyword}</strong></td>
        <td><span class="badge badge-blue" style="font-size:10px">${i.category}</span></td>
        <td>
          <input type="number" value="${i.weight}" step="0.5" min="0.5" max="5"
            style="width:70px;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--text-primary);font-family:var(--font-mono)"
            onchange="updateWeight(\"${i.indicator_id}\",this.value)">
        </td>
        <td>${i.is_active?"<span style=\"color:var(--accent-green)\">✓ Active</span>":"<span style=\"color:var(--text-muted)\">Disabled</span>"}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="showToast(\"Disable feature coming soon\",\"info\")">Toggle</button></td>
      </tr>`).join("") || "<tr><td colspan=\"5\" style=\"text-align:center;color:var(--text-muted)\">No indicators</td></tr>";
  } catch(e) { console.error(e); }
}
async function addIndicator() {
  const keyword = document.getElementById("new-kw").value.trim();
  const category = document.getElementById("new-cat").value;
  const weight = parseFloat(document.getElementById("new-wt").value);
  if (!keyword) { showToast("Enter a keyword","warning"); return; }
  try {
    await DB.addIndicator({ keyword, category, weight });
    showToast("Indicator added","success");
    document.getElementById("new-kw").value = "";
    loadIndicators();
  } catch(e) { showToast("Added (demo)","info"); }
}
async function updateWeight(id, weight) {
  try { await DB.updateIndicatorWeight(id, parseFloat(weight)); showToast("Weight updated","success"); } catch(e) {}
}
document.addEventListener("DOMContentLoaded", () => { initTheme(); requireAdmin(); loadIndicators(); });

</script>
</body></html>
