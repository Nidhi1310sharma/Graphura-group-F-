<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="page-container" style="max-width:860px;margin-top:28px">
  <div style="display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start">
    <div>
      <div class="card" style="text-align:center;padding:24px">
        <div id="profile-avatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#58a6ff,#bc8cff);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;margin:0 auto 14px">?</div>
        <div id="profile-name" style="font-size:18px;font-weight:700;margin-bottom:3px">Loading</div>
        <div id="profile-email" style="font-size:12px;color:var(--text-muted);margin-bottom:10px"></div>
        <div id="profile-bio" style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6"></div>
        <div style="display:flex;gap:20px;justify-content:center;margin-bottom:16px">
          <div style="text-align:center"><div id="stat-reports" style="font-size:20px;font-weight:800;font-family:var(--font-mono)">0</div><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase">Reports</div></div>
          <div style="text-align:center"><div id="stat-checks" style="font-size:20px;font-weight:800;font-family:var(--font-mono)">0</div><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase">Checks</div></div>
        </div>
        <button class="btn btn-outline btn-full" onclick="showEdit()">Edit Profile</button>
        <button class="btn btn-ghost btn-full mt-2" onclick="auth.logout()">Sign Out</button>
      </div>
      <div class="card mt-3" id="edit-form" style="display:none">
        <div class="card-title">Edit Profile</div>
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="edit-name" class="form-control"></div>
        <div class="form-group"><label class="form-label">City</label><input type="text" id="edit-city" class="form-control" placeholder="Pune, Maharashtra"></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea id="edit-bio" class="form-control" rows="3"></textarea></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="saveProfile()">Save</button>
          <button class="btn btn-ghost" onclick="document.getElementById('edit-form').style.display='none'">Cancel</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="filter-chip active" onclick="showTab('reports',this)">My Reports</button>
        <button class="filter-chip" onclick="showTab('activity',this)">My Activity</button>
      </div>
      <div id="tab-reports">
        <div id="user-reports-list"><div style="text-align:center;padding:20px;color:var(--text-muted)">Loading...</div></div>
      </div>
      <div id="tab-activity" style="display:none">
        <div class="card">
          <div class="card-title">Recent Activity</div>
          <div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">Activity tracking connects to Supabase audit logs. Demo mode shows static data.</div>
          <div style="display:flex;flex-direction:column;gap:0">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px"><span>🔍</span><span style="flex:1">Analyzed tcs-careers-hiring.xyz</span><span style="color:var(--text-muted);font-size:11px">2 days ago</span></div>
            <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px"><span>🚩</span><span style="flex:1">Reported Career Solutions Ltd</span><span style="color:var(--text-muted);font-size:11px">7 days ago</span></div>
            <div style="display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px"><span>👍</span><span style="flex:1">Upvoted 3 community posts</span><span style="color:var(--text-muted);font-size:11px">1 week ago</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/nav.js"></script>
<script src="js/chatbot.js"></script>
<script>
function loadProfile() {
  const user = auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }
  document.getElementById('profile-avatar').textContent = (user.full_name || 'U')[0].toUpperCase();
  document.getElementById('profile-name').textContent = user.full_name || 'User';
  document.getElementById('profile-email').textContent = user.email || '';
  document.getElementById('profile-bio').textContent = user.bio || 'No bio added yet.';
  document.getElementById('stat-reports').textContent = user.reports_count || 0;
  document.getElementById('stat-checks').textContent = user.checks_count || 0;
  document.getElementById('edit-name').value = user.full_name || '';
  document.getElementById('edit-bio').value = user.bio || '';
  document.getElementById('edit-city').value = user.city || '';
  loadUserReports(user.user_id);
}
async function loadUserReports(userId) {
  try {
    const reports = await DB.getUserReports(userId);
    const el = document.getElementById('user-reports-list');
    if (!reports.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">No reports submitted yet. <a href="report.html" class="link">Report a scam</a></div>'; return; }
    const sevColor = { critical:'badge-red', high:'badge-orange', medium:'badge-yellow', low:'badge-gray' };
    el.innerHTML = reports.map(r => `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <strong>${r.company_name}</strong>
          <span class="badge ${sevColor[r.severity]||'badge-gray'}" style="font-size:10px">${r.severity}</span>
          <span class="badge ${r.status==='confirmed'?'badge-green':r.status==='rejected'?'badge-gray':'badge-yellow'}" style="font-size:10px">${r.status}</span>
          <span style="margin-left:auto;font-size:11px;color:var(--text-muted)">${new Date(r.reported_at).toLocaleDateString('en-IN')}</span>
        </div>
        <div style="font-size:12.5px;color:var(--text-secondary)">${r.description.slice(0,120)}${r.description.length>120?'...':''}</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('user-reports-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">Connect Supabase to load your reports</div>';
  }
}
function showTab(tab, btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-reports').style.display = tab === 'reports' ? 'block' : 'none';
  document.getElementById('tab-activity').style.display = tab === 'activity' ? 'block' : 'none';
}
function showEdit() { document.getElementById('edit-form').style.display = 'block'; }
function saveProfile() {
  const user = auth.getUser();
  if (!user) return;
  user.full_name = document.getElementById('edit-name').value.trim() || user.full_name;
  user.bio = document.getElementById('edit-bio').value.trim();
  user.city = document.getElementById('edit-city').value.trim();
  localStorage.setItem('ss_user', JSON.stringify(user));
  showToast('Profile updated', 'success');
  document.getElementById('edit-form').style.display = 'none';
  loadProfile();
}
document.addEventListener('DOMContentLoaded', () => { initTheme(); renderNavbar(); loadProfile(); });
</script>
</body></html>
