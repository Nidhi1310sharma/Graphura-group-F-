<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-hero { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .profile-avatar-wrap { position: relative; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #58a6ff, #bc8cff); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 700; color: white; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar-edit { position: absolute; bottom: 0; right: 0; background: var(--bg-card); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
    .profile-info { flex: 1; }
    .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .profile-role { font-size: 13px; color: var(--accent-blue); margin-bottom: 8px; }
    .profile-stats { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
    .profile-stat { text-align: center; }
    .profile-stat-val { font-size: 20px; font-weight: 800; font-family: monospace; }
    .profile-stat-lbl { font-size: 11px; color: var(--text-muted); }
    .skill-tag { display: inline-block; background: rgba(88,166,255,0.15); color: #58a6ff; padding: 4px 10px; border-radius: 99px; font-size: 12px; margin: 4px; }
    .skill-tag span { cursor: pointer; margin-left: 6px; opacity: 0.6; }
    .hidden { display: none; }
    .edit-mode { display: none; }
    .view-mode { display: block; }
    body.editing .edit-mode { display: block; }
    body.editing .view-mode { display: none; }
    .profile-completion { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .completion-bar { height: 6px; border-radius: 99px; background: var(--bg-input); margin: 8px 0; overflow: hidden; }
    .completion-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.3s; }
    .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .activity-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--bg-input); }
    .activity-body { flex: 1; }
    .activity-title { font-size: 13.5px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
    .activity-meta { font-size: 11.5px; color: var(--text-muted); }
    .badge-green { background: rgba(34,197,94,0.15); color: #3fb950; }
    .badge-yellow { background: rgba(245,158,11,0.15); color: #f0883e; }
    .badge-red { background: rgba(220,38,38,0.15); color: #f85149; }
    .badge-gray { background: rgba(139,148,158,0.15); color: #8b949e; }
    .divider { margin: 16px 0; border-color: var(--border); }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab-btn { padding: 8px 20px; background: none; border: none; color: var(--text-secondary); cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; }
    .tab-btn.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="page-inner" style="max-width:900px; margin:0 auto">
      <button class="back-btn" onclick="history.back()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
      
      <!-- Profile Completion -->
      <div class="profile-completion">
        <div class="flex-between"><span style="font-size:13.5px;font-weight:600">Profile Completion</span><span id="completion-pct" style="font-size:13px;color:var(--accent-blue);font-weight:700">0%</span></div>
        <div class="completion-bar"><div class="completion-fill" id="completion-fill" style="width:0%"></div></div>
        <p class="text-xs text-muted" id="completion-hint">Add your photo and skills to improve your profile</p>
      </div>

      <!-- Profile Hero -->
      <div class="profile-hero">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar-display">U</div>
          <div class="profile-avatar-edit" onclick="document.getElementById('profile-avatar-input').click()" title="Change photo">✏️</div>
          <input type="file" id="profile-avatar-input" accept="image/*" style="display:none" onchange="updateAvatar(this)">
        </div>
        <div class="profile-info">
          <div class="view-mode">
            <div class="profile-name" id="display-name">Loading...</div>
            <div class="profile-role" id="display-role">Member</div>
            <div id="display-bio" class="text-sm text-secondary" style="margin-bottom:8px"></div>
            <div style="display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--text-muted);margin-bottom:10px">
              <span id="display-email"> —</span>
              <span id="display-mobile"> —</span>
              <span id="display-city">📍 —</span>
            </div>
            <div class="skill-tags" id="display-skills"></div>
          </div>
          <div class="edit-mode">
            <div class="two-col" style="gap:10px">
              <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="edit-name" class="form-control"></div>
              <div class="form-group"><label class="form-label">Mobile</label><input type="tel" id="edit-mobile" class="form-control"></div>
            </div>
            <div class="two-col" style="gap:10px">
              <div class="form-group"><label class="form-label">City</label><input type="text" id="edit-city" class="form-control"></div>
              <div class="form-group"><label class="form-label">Profession</label><select id="edit-profession" class="form-control"><option>Student</option><option>Fresher</option><option>Working Professional</option><option>Job Seeker</option><option>Freelancer</option><option>Other</option></select></div>
            </div>
            <div class="form-group"><label class="form-label">Bio</label><textarea id="edit-bio" class="form-control" rows="2"></textarea></div>
            <div class="form-group">
              <label class="form-label">Skills</label>
              <div style="display:flex;gap:8px"><input type="text" id="edit-skill-input" class="form-control" placeholder="Add skill..." onkeydown="if(event.key==='Enter'){addEditSkill();event.preventDefault()}"><button class="btn btn-outline btn-sm" onclick="addEditSkill()">Add</button></div>
              <div class="skills-preview" id="edit-skills-preview" style="margin-top:8px"></div>
            </div>
          </div>
          <div class="profile-stats">
            <div class="profile-stat"><div class="profile-stat-val" id="stat-reports">0</div><div class="profile-stat-lbl">Reports</div></div>
            <div class="profile-stat"><div class="profile-stat-val" id="stat-checks">0</div><div class="profile-stat-lbl">Checks</div></div>
            <div class="profile-stat"><div class="profile-stat-val" id="stat-upvotes">0</div><div class="profile-stat-lbl">Upvotes</div></div>
            <div class="profile-stat"><div class="profile-stat-val" id="stat-joined">—</div><div class="profile-stat-lbl">Joined</div></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-self:flex-start">
          <button class="btn btn-primary" id="edit-toggle-btn" onclick="toggleEditMode()">✏️ Edit Profile</button>
          <button class="btn btn-danger hidden" id="save-btn" onclick="saveProfile()">💾 Save Changes</button>
          <button class="btn btn-outline hidden" id="cancel-btn" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-outline" onclick="handleLogout()">Sign Out</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="activity">Activity</button>
        <button class="tab-btn" data-tab="my-reports">My Reports</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </div>

      <div id="tab-activity" class="tab-content active">
        <div class="card"><div class="card-title">Recent Activity</div><div id="activity-list">Loading...</div></div>
      </div>

      <div id="tab-my-reports" class="tab-content">
        <div class="card">
          <div class="card-title flex-between"><span>My Scam Reports</span><a href="report.html" class="btn btn-danger btn-sm">+ New Report</a></div>
          <div class="table-wrap"><table class="table"><thead><tr><th>Company</th><th>Type</th><th>Status</th><th>Date</th><th>Upvotes</th></tr></thead><tbody id="my-reports-tbody"></tbody></table></div>
        </div>
      </div>

      <div id="tab-settings" class="tab-content">
        <div class="card">
          <div class="card-title">Account Settings</div>
          <div class="form-group"><label class="form-label">Email Notifications</label>
            <div style="display:flex;flex-direction:column;gap:8px">
              <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="notif-alerts" checked> New scam alerts</label>
              <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="notif-reports" checked> Updates on my reports</label>
            </div>
          </div>
          <hr class="divider">
          <div class="form-group"><label class="form-label">Change Password</label><input type="password" id="curr-password" class="form-control mb-2" placeholder="Current password"><input type="password" id="new-password" class="form-control mb-2" placeholder="New password"><input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password"></div>
          <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
          <hr class="divider">
          <div><p style="font-size:13.5px;font-weight:600;color:var(--accent-red);margin-bottom:8px">Danger Zone</p><button class="btn btn-outline" style="border-color:var(--accent-red);color:var(--accent-red)" onclick="deleteAccount()">Delete Account</button></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/nav.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/chatbot.js"></script>
<script>
//const API_BASE = 'http://localhost:8000/api';
let editSkills = [];
let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
  renderNavbar();
  const token = localStorage.getItem('gr_token');
  if (!token) { window.location.href = 'login.html'; return; }
  await loadProfile();
  setupTabs();
});

async function loadProfile() {
  try {
    const response = await fetch(`${API_BASE}/auth/me`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('gr_token')}` }
    });
    if (!response.ok) throw new Error('Failed to load profile');
    currentUser = await response.json();
    localStorage.setItem('gr_user', JSON.stringify(currentUser));
    renderProfile(currentUser);
    await loadMyReports();
    await loadActivity();
  } catch (e) { showToast('Failed to load profile', 'error'); }
}

function renderProfile(user) {
  const avatar = document.getElementById('profile-avatar-display');
  if (user.avatar) avatar.innerHTML = `<img src="${user.avatar}">`;
  else avatar.textContent = (user.full_name || 'U')[0].toUpperCase();
  document.getElementById('display-name').textContent = user.full_name || 'User';
  document.getElementById('display-role').textContent = user.profession || (user.role === 'admin' ? 'Administrator' : 'Member');
  document.getElementById('display-bio').textContent = user.bio || '';
  document.getElementById('display-email').innerHTML = '✉️ ' + (user.email || '—');
  document.getElementById('display-mobile').innerHTML = '📱 ' + (user.mobile || '—');
  document.getElementById('display-city').innerHTML = '📍 ' + (user.city || '—');
  document.getElementById('display-skills').innerHTML = (user.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
  document.getElementById('stat-reports').textContent = user.reports_count || 0;
  document.getElementById('stat-checks').textContent = user.checks_count || 0;
  document.getElementById('stat-upvotes').textContent = user.upvotes || 0;
  document.getElementById('stat-joined').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'Recently';
  updateCompletion(user);
  editSkills = [...(user.skills || [])];
}

function updateCompletion(user) {
  let score = 0;
  if (user.full_name) score += 20;
  if (user.avatar) score += 20;
  if (user.mobile) score += 15;
  if (user.bio) score += 15;
  if (user.skills?.length) score += 15;
  if (user.city) score += 15;
  document.getElementById('completion-pct').textContent = score + '%';
  document.getElementById('completion-fill').style.width = score + '%';
}

async function loadMyReports() {
  try {
    const response = await fetch(`${API_BASE}/reports/my-reports`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('gr_token')}` }
    });
    const reports = await response.json();
    const tbody = document.getElementById('my-reports-tbody');
    if (!reports.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No reports yet</td></tr>'; return; }
    tbody.innerHTML = reports.map(r => `<tr><td><strong>${r.company_name}</strong></td><td><span class="badge badge-red">${r.scam_type?.replace(/_/g,' ')}</span></td><td><span class="badge ${r.status==='confirmed'?'badge-green':'badge-yellow'}">${r.status}</span></td><td>${new Date(r.created_at).toLocaleDateString()}</td><td>${r.upvotes || 0}</td></tr>`).join('');
  } catch(e) { console.error(e); }
}

async function loadActivity() {
  document.getElementById('activity-list').innerHTML = '<div class="activity-item"><div class="activity-body">Loading activity...</div></div>';
}

function toggleEditMode() {
  document.body.classList.add('editing');
  document.getElementById('edit-toggle-btn').classList.add('hidden');
  document.getElementById('save-btn').classList.remove('hidden');
  document.getElementById('cancel-btn').classList.remove('hidden');
  document.getElementById('edit-name').value = currentUser.full_name || '';
  document.getElementById('edit-mobile').value = currentUser.mobile || '';
  document.getElementById('edit-city').value = currentUser.city || '';
  document.getElementById('edit-bio').value = currentUser.bio || '';
  document.getElementById('edit-profession').value = currentUser.profession || 'Student';
  renderEditSkills();
}

function cancelEdit() {
  document.body.classList.remove('editing');
  document.getElementById('edit-toggle-btn').classList.remove('hidden');
  document.getElementById('save-btn').classList.add('hidden');
  document.getElementById('cancel-btn').classList.add('hidden');
}

function addEditSkill() {
  const input = document.getElementById('edit-skill-input');
  const val = input.value.trim();
  if (!val || editSkills.includes(val)) { input.value = ''; return; }
  editSkills.push(val); input.value = '';
  renderEditSkills();
}

function renderEditSkills() {
  const preview = document.getElementById('edit-skills-preview');
  preview.innerHTML = editSkills.map(s => `<span class="skill-tag" style="cursor:pointer" onclick="removeEditSkill('${s}')">${s} <span style="opacity:0.6">✕</span></span>`).join('');
  if (!editSkills.length) preview.innerHTML = '<span class="text-muted" style="font-size:12px">No skills added</span>';
}

function removeEditSkill(s) { editSkills = editSkills.filter(x => x !== s); renderEditSkills(); }

async function saveProfile() {
  const updated = {
    full_name: document.getElementById('edit-name').value.trim(),
    mobile: document.getElementById('edit-mobile').value.trim(),
    city: document.getElementById('edit-city').value.trim(),
    bio: document.getElementById('edit-bio').value.trim(),
    profession: document.getElementById('edit-profession').value,
    skills: editSkills
  };
  try {
    const response = await fetch(`${API_BASE}/auth/profile`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('gr_token')}` },
      body: JSON.stringify(updated)
    });
    if (!response.ok) throw new Error('Update failed');
    currentUser = { ...currentUser, ...updated };
    localStorage.setItem('gr_user', JSON.stringify(currentUser));
    renderProfile(currentUser);
    cancelEdit();
    showToast('Profile updated!', 'success');
  } catch(e) { showToast('Failed to update profile', 'error'); }
}

async function changePassword() {
  const curr = document.getElementById('curr-password').value;
  const newPwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  if (newPwd !== confirm) { showToast('New passwords do not match', 'error'); return; }
  try {
    const response = await fetch(`${API_BASE}/auth/change-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('gr_token')}` },
      body: JSON.stringify({ current_password: curr, new_password: newPwd })
    });
    if (!response.ok) throw new Error('Password change failed');
    showToast('Password changed!', 'success');
    document.getElementById('curr-password').value = '';
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-password').value = '';
  } catch(e) { showToast('Failed to change password', 'error'); }
}

function deleteAccount() { if(confirm('Delete account permanently? This cannot be undone.')) { /* call delete API */ showToast('Account deleted', 'info'); setTimeout(()=>handleLogout(),2000); } }
function handleLogout() { localStorage.clear(); window.location.href = 'login.html'; }
function setupTabs() { document.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active'); }; }); }
function showToast(msg, type) { const t=document.createElement('div'); t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:'+(type==='error'?'#f85149':'#3fb950')+';color:white;padding:12px 24px;border-radius:8px;z-index:9999'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
</script>
</body>
</html>
