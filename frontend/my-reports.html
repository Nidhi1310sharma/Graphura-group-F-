<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reports – ScamShield</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="page-inner">
      <button class="back-btn" onclick="history.back()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
      
      <div class="page-header flex-between" style="align-items:flex-end">
        <div><h1> My Reports</h1><p>All scam reports you've submitted</p></div>
        <a href="report.html" class="btn btn-danger">+ New Report</a>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card" style="--stat-accent:var(--accent-blue)"><div class="stat-value" id="my-total">0</div><div class="stat-label">Total Reports</div></div>
        <div class="stat-card" style="--stat-accent:var(--accent-green)"><div class="stat-value" id="my-confirmed">0</div><div class="stat-label">Confirmed</div></div>
        <div class="stat-card" style="--stat-accent:var(--accent-yellow)"><div class="stat-value" id="my-pending">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card" style="--stat-accent:var(--accent-purple)"><div class="stat-value" id="my-upvotes">0</div><div class="stat-label">Total Upvotes</div></div>
      </div>

      <div class="card mt-4">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Company</th><th>Job Title</th><th>Type</th><th>Status</th><th>Upvotes</th><th>Date</th></tr></thead>
            <tbody id="my-reports-body">
              <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">Loading your reports...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/nav.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/chatbot.js"></script>
<script>
const DEMO_REPORTS = [
  { company_name: 'Career Solutions Ltd', job_title: 'Data Entry Intern', scam_type: 'fee_demand', status: 'confirmed', upvotes: 14, reported_at: new Date(Date.now() - 7*24*3600000).toISOString() },
  { company_name: 'DigiWork India', job_title: 'WFH Data Entry', scam_type: 'fake_offer', status: 'pending', upvotes: 3, reported_at: new Date(Date.now() - 2*24*3600000).toISOString() },
];
document.addEventListener('DOMContentLoaded', () => {
  const user = auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }
  renderNavbar();
  if (!_getUser()) { _showLoginRequired("access this page"); setTimeout(()=>window.location.href="login.html",2000); return; }
  
  loadReports();
});

async function loadReports() {
  let reports = DEMO_REPORTS;
  try {
    const data = await api.get('/reports');
    if (data.reports?.length) reports = data.reports;
  } catch(e) {}
  document.getElementById('my-total').textContent = reports.length;
  document.getElementById('my-confirmed').textContent = reports.filter(r => r.status === 'confirmed').length;
  document.getElementById('my-pending').textContent = reports.filter(r => r.status === 'pending').length;
  document.getElementById('my-upvotes').textContent = reports.reduce((s, r) => s + (r.upvotes || 0), 0);
  const tbody = document.getElementById('my-reports-body');
  if (!reports.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">No reports yet. <a href="report.html" class="link">Submit your first report</a></td></tr>'; return; }
  const statusBadge = s => ({ confirmed: 'badge-green', pending: 'badge-yellow', rejected: 'badge-gray' }[s] || 'badge-gray');
  tbody.innerHTML = reports.map(r => `<tr>
    <td><strong>${r.company_name}</strong></td>
    <td class="text-secondary">${r.job_title || '—'}</td>
    <td><span class="badge badge-red">${r.scam_type?.replace(/_/g,' ') || '—'}</span></td>
    <td><span class="badge ${statusBadge(r.status)}">${r.status}</span></td>
    <td>${r.upvotes || 0}</td>
    <td class="text-muted">${timeAgo(r.reported_at)}</td>
  </tr>`).join('');
}
</script>
</body></html>
